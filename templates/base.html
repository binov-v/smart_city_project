<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
          crossorigin="anonymous">
    <title>{{title}}</title>
</head>
<body>
<header class="container-fluid mt-3">
    <nav class="navbar navbar-light bg-light d-flex justify-content-between align-items-center px-3"">

        <h1 class="mb-0">Миссия Колонизация Марса</h1>

        <div class="auth-links">
            {% if current_user.is_authenticated %}
            <a class="navbar-brand" href="/logout">{{ current_user.name }}</a>
            {% else %}
            <div class="d-flex gap-2">
                <a class="btn btn-primary btn-sm" href="/register">Зарегистрироваться</a>
                <a class="btn btn-success btn-sm" href="/login">Войти</a>
            </div>
            {% endif %}
        </div>

        <a class="navbar-brand m-0" href="#">Mars One</a>

    </nav>
    <h4 class="text-muted mt-2 px-3" style="font-weight: 300; opacity: 0.7;">
        И на Марсе будут яблони цвести!
    </h4>
</header>

<main role="main" class="container mt-4">
    {% block content %}{% endblock %}
</main>
</body>
</html>
