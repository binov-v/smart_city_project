<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <title>{{ title }}</title>
</head>
<body>
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="логотип сайта"
         class="logo">
    <div class="register-container">
        <form class="login-form">
            <div class="field">
                <input type="email" id="email" placeholder="Почта">
            </div>

            <div class="field">
                <input type="password" id="password" placeholder="Пароль">
            </div>

            <button type="submit" class="login-btn" style="margin-bottom: 50px;">Войти</button>
            <button type="button" class="register-btn">Зарегистрироваться</button>
        </form>
    </div>
</body>
</html>
